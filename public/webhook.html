<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Listener</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        textarea { resize: vertical; height: 150px; font-family: monospace; }
        button { padding: 10px 15px; cursor: pointer; }
        #endpoint { background-color: #f0f0f0; padding: 8px; border: 1px solid #ccc; }    
        pre { background-color: #eee; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .request-item { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .request-timestamp { font-weight: bold; color: #555; }
    </style>
</head>
<body>
    <a href="./../index.html">Index</a></p>
    <div class="container">
        <h1>Webhook Listener</h1>

        <div class="form-group">
            <label for="endpoint">Webhook Request Endpoint: </label>
        <div id="endpoint"></div>
        </div>

        <div>
            <h2>Received Webhook Requests</h2>
            <table  style="vertical-align: top;"><tr>
                <td>
                    <label for="update-interval">Atualização:</label>
                    <select id="update-interval">
                        <option value="5000">5s</option>
                        <option value="15000" selected>15s</option>
                        <option value="30000">30s</option>
                        <option value="60000">60s</option>
                        <option value="180000">3min</option>
                        <option value="300000">5min</option>
                        <option value="600000">10min</option>
                        <option value="1800000">30min</option>
                        <option value="3600000">60min</option>
                        <option value="10800000">3h</option>
                        <option value="18000000">5h</option>
                        <option value="43200000">12h</option>
                        <option value="86400000">24h</option>
                        <option value="0">Never</option>
                    </select>
                </td>
                <td  style="vertical-align: top;"><a href="/download-log" style="margin-left: 20px; font-weight: bold;">Download Log</a></td>
                <td style="vertical-align: top; padding-left: 20px;"><button id="seeLogBtn">See Log</button></td>
            </tr></table>
        </div>
        <ul id="webhook-requests">
            <!-- Webhook requests will be dynamically added here -->
        </ul>

        <script>
            document.getElementById("endpoint").textContent = window.location.origin + "/webhook";
            const webhookRequestsList = document.getElementById("webhook-requests");
            const updateIntervalSelect = document.getElementById("update-interval");
            let updateIntervalId;

            // Function to convert interval string to milliseconds
            function parseInterval(value) {
                if (value === "0") return 0; // Never
                const num = parseInt(value, 10);
                return num; // Values are already in milliseconds
            }

            // Function to fetch and display webhook requests
            async function fetchWebhookRequests() {
                try {
                    const response = await fetch("/api/webhook-logs");
                    const logs = await response.json();

                    webhookRequestsList.innerHTML = ""; // Clear existing list

                    logs.forEach(log => {
                        const listItem = document.createElement("li");
                        listItem.className = "request-item";
                        listItem.innerHTML = `
                            <div class="request-timestamp">Received at: ${new Date(log.timestamp).toLocaleString('pt-BR', { timeZone: 'UTC' })} UTC 0 (Gw) </div>
                            <pre>${JSON.stringify(log.data, null, 2)}</pre>
                        `;
                        webhookRequestsList.prepend(listItem); // Add new requests to the top
                    });

                } catch (error) {
                    console.error("Error fetching webhook requests:", error);
                }
            }

            // Function to set or clear the update interval
            function setUpdateInterval() {
                if (updateIntervalId) {
                    clearInterval(updateIntervalId);
                }

                const interval = parseInterval(updateIntervalSelect.value);
                if (interval > 0) {
                    updateIntervalId = setInterval(fetchWebhookRequests, interval);
                }
                fetchWebhookRequests(); // Initial fetch immediately
            }

            // Event listener for combo-box changes
            updateIntervalSelect.addEventListener("change", setUpdateInterval);

            // Set initial interval
            setUpdateInterval();

            // See Log Button functionality
            const seeLogBtn = document.getElementById("seeLogBtn");
            seeLogBtn.addEventListener("click", async () => {
                try {
                    const response = await fetch("/view-log");
                    const logContent = await response.text();

                    const logWindow = window.open("", "Log Viewer", "width=800,height=600");
                    if (logWindow) {
                        logWindow.document.write("<pre>" + logContent + "</pre>");
                        logWindow.document.close();
                    } else {
                        alert("Popup blocked! Please allow popups for this site to view the log.");
                    }
                } catch (error) {
                    console.error("Error fetching log file for viewing:", error);
                    alert("Error fetching log file.");
                }
            });
        </script>
    </div>
</body>
</html>
