<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        textarea { resize: vertical; height: 150px; font-family: monospace; }
        button { padding: 10px 15px; cursor: pointer; }
        #endpoint { background-color: #f0f0f0; padding: 8px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <a href="./../index.html">Index</a></p>
    <div class="container">
        <h1>Login</h1>
        
        <div class="form-group">
            <label for="endpoint">Request Endpoint:</label>
            <div id="endpoint"></div>
        </div>

        <div class="form-group">
            <label for="cid">cid:</label>
            <input type="text" id="cid" value="RkZ10r6JpTyDp/7iqT630lKmt0Tka6AK">
        </div>

        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" value="dev">
        </div>

        <div class="form-group">
            <label for="pwd">pwd:</label>
            <input type="text" id="pwd" value="123456">
        </div>

        <button id="sendBtn">Send</button>

        <div class="form-group">
            <label for="bodyJson">Body JSON:</label>
            <textarea id="bodyJson" readonly></textarea>
        </div>

        <div class="form-group">
            <label for="responseJson">Response JSON:</label>
            <textarea id="responseJson" readonly></textarea>
        </div>

        <div class="form-group">
            <label for="curlEquivalent">cURL Equivalent:</label>
            <textarea id="curlEquivalent" readonly></textarea>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
